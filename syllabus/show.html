<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Definitions Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background-color: #f4f6f9; }
    .card-topic { cursor: pointer; }
    .definition-text { white-space: normal; line-height: 1.6; padding: 0.5rem 0.75rem; background: #ffffff; border: 1px solid #e3e6ea; border-radius: 0.4rem; }
    .definition-text p { margin: 0.4rem 0; }
    .definition-text code, .definition-text pre { background: #f8f9fa; border-radius: 4px; padding: 0.2rem 0.35rem; }
    .definition-text pre { padding: 0.8rem; overflow: auto; border: 1px solid #ddd; }
    .katex-display {
      margin: 0.35rem 0 !important;
      text-align: left !important;
      width: auto !important;
      padding: 0 !important;
      display: block !important;
    }
    .katex-display .katex-mathml,
    .katex-display .katex-html {
      text-align: left !important;
      margin: 0 !important;
    }
    .katex {
      font-size: 1.05em !important;
      display: inline !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    .highlight { background: #fff9c4; }
    #loader { display: none; }
  </style>
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-3">AI Definitions</h1>
    <p class="text-muted">Visual overview of your <code>class6syllabus-topic.json</code> data, grouped by subject/chapter/topic.</p>

    <div class="row mb-3">
      <div class="col-md-4">
        <input id="searchInput" type="search" class="form-control" placeholder="Search topic, chapter, subject..." aria-label="Search" />
      </div>
      <div class="col-md-4">
        <select id="renderMode" class="form-select" aria-label="Render mode">
          <option value="fancy" selected>Render Markdown + Math</option>
          <option value="plain">Show Raw Text</option>
        </select>
      </div>
      <div class="col-md-4 text-end">
        <button id="reloadBtn" class="btn btn-primary">Reload JSON</button>
      </div>
    </div>

    <div id="loader" class="py-5 text-center">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3">Loading class6syllabus-topic.json...</p>
    </div>

    <div id="dataContainer"></div>
  </div>

  <script>
    const dataContainer = document.getElementById('dataContainer');
    const searchInput = document.getElementById('searchInput');
    const reloadBtn = document.getElementById('reloadBtn');
    const loader = document.getElementById('loader');

    function hideLoader() { loader.style.display = 'none'; }
    function showLoader() { loader.style.display = 'block'; }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>'"`]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '`': '&#96;'
      }[char]));
    }

    function buildTemplate(data, filter) {
      if (!Array.isArray(data) || data.length === 0) {
        return '<div class="alert alert-warning">No data found in class6syllabus-topic.json</div>';
      }

      const q = typeof filter === 'string' ? filter.trim().toLowerCase() : '';
      let visibleCount = 0;
      const tabs = [];
      const panes = [];

      data.forEach((subject, index) => {
        const sName = subject.subject || 'Unknown Subject';
        const sYear = subject.year ? ` (${subject.year})` : '';

        let chapterTabs = [];
        let chapterPanes = [];
        let chapterMatches = 0;

        (subject.chapters || []).forEach((chapter, cIndex) => {
          const cName = chapter.chapter || 'Untitled Chapter';
          let chapterInner = '';

          (chapter.topics || []).forEach(topic => {
            const tName = topic.topic || 'Untitled Topic';
            const def = topic.definition || '';
            const match = q.length === 0 || [sName, sYear, cName, tName, def].some(x => (x || '').toLowerCase().includes(q));
            if (!match) return;

            visibleCount += 1;
            chapterMatches += 1;

            const renderedDefinition = renderDefinition(def);
            chapterInner += `
              <div class='card mb-2 border-0 shadow-sm w-100'>
                <div class='card-body p-3'>
                  <h5 class='mb-1 card-topic' data-topic='${escapeHtml(tName)}'>${escapeHtml(tName)}</h5>
                  <div class='definition-text text-secondary'>${renderedDefinition}</div>
                </div>
              </div>`;
          });

          if (!chapterInner) return;

          const chapterTabId = `subject-${index}-chapter-${cIndex}`;
          chapterTabs.push(`
            <li class='nav-item' role='presentation'>
              <button class='nav-link ${chapterTabs.length === 0 ? 'active' : ''}' id='${chapterTabId}-button' data-bs-toggle='tab' data-bs-target='#${chapterTabId}' type='button' role='tab' aria-controls='${chapterTabId}' aria-selected='${chapterTabs.length === 0}'>${escapeHtml(cName)}</button>
            </li>`);

          chapterPanes.push(`
            <div class='tab-pane fade ${chapterPanes.length === 0 ? 'show active' : ''} pt-2' id='${chapterTabId}' role='tabpanel' aria-labelledby='${chapterTabId}-button'>
              <div class='row gx-0'>${chapterInner}</div>
            </div>`);
        });

        if (chapterMatches === 0) return;

        const tabId = `subject-tab-${index}`;
        tabs.push(`
          <li class='nav-item' role='presentation'>
            <button class='nav-link${tabs.length === 0 ? ' active' : ''}' id='${tabId}-button' data-bs-toggle='tab' data-bs-target='#${tabId}' type='button' role='tab' aria-controls='${tabId}' aria-selected='${tabs.length === 0}'>${escapeHtml(sName)}${sYear}</button>
          </li>`);

        panes.push(`
          <div class='tab-pane fade${panes.length === 0 ? ' show active' : ''}' id='${tabId}' role='tabpanel' aria-labelledby='${tabId}-button'>
            <ul class='nav nav-pills mb-3' role='tablist'>
              ${chapterTabs.join('')}
            </ul>
            <div class='tab-content'>
              ${chapterPanes.join('')}
            </div>
          </div>`);
      });

      if (visibleCount === 0) {
        return '<div class="alert alert-info">No definitions match filter.</div>';
      }

      return `
        <ul class='nav nav-tabs mb-3' role='tablist'>
          ${tabs.join('')}
        </ul>
        <div class='tab-content'>
          ${panes.join('')}
        </div>`;
    }

    function renderMarkdownWithMath(def) {
      if (!def) return '<p class="text-muted">No definition available.</p>';
      let mathProcessed = def;
      // Convert display math first ($$...$$)
      mathProcessed = mathProcessed.replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
        try {
          return katex.renderToString(expr.trim(), {throwOnError: false, displayMode: true});
        } catch (e) {
          return `$$${expr}$$`;
        }
      });
      // Convert inline math ($...$)
      mathProcessed = mathProcessed.replace(/\$([^\$]+?)\$/g, (_, expr) => {
        try {
          return katex.renderToString(expr.trim(), {throwOnError: false, displayMode: false});
        } catch (e) {
          return `$${expr}$`;
        }
      });
      // Markdown parse after math render, so math HTML remains intact.
      return marked.parse(mathProcessed);
    }

    function renderMath(element) {
      if (!window.katex) return;
      const textNodes = Array.from(element.querySelectorAll('.definition-text'));
      textNodes.forEach(node => {
        const inner = node.innerHTML;
        if (!inner) return;
      });
    }

    let renderMode = 'fancy';

    function renderDefinition(def) {
      if (renderMode === 'plain') {
        const escaped = escapeHtml(def || 'No definition available.');
        return `<div style="white-space: pre-wrap;">${escaped}</div>`;
      }
      // fancy mode: render markdown + katex
      return renderMarkdownWithMath(def);
    }

    function render(data, filter) {
      dataContainer.innerHTML = buildTemplate(data, filter);
      document.querySelectorAll('.card-topic').forEach(el => {
        el.addEventListener('click', () => {
          const parent = el.closest('.card-body');
          const defDiv = parent.querySelector('.definition-text');
          if (!defDiv) return;
          defDiv.classList.toggle('highlight');
          defDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function load() {
      showLoader();
      fetch('class6syllabus-topic.json').then(r => r.json()).then(data => {
        hideLoader();
        window.latestData = data;
        render(data, searchInput.value);
      }).catch(err => {
        hideLoader();
        dataContainer.innerHTML = `<div class='alert alert-danger'>Failed to load class6syllabus-topic.json: ${escapeHtml(err.message || err)}</div>`;
        console.error(err);
      });
    }

    searchInput.addEventListener('input', () => {
      render(window.latestData || [], searchInput.value);
    });

    const renderModeSelect = document.getElementById('renderMode');
    renderModeSelect.addEventListener('change', () => {
      renderMode = renderModeSelect.value;
      render(window.latestData || [], searchInput.value);
    });

    reloadBtn.addEventListener('click', load);

    load();
  </script>
</body>
</html>
